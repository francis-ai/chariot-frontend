<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="360" fill="#F8FAFC"/>
  <rect x="28" y="28" width="1144" height="304" rx="12" fill="white" stroke="#CBD5E1"/>
  <rect x="28" y="28" width="1144" height="56" rx="12" fill="#0F172A"/>
  <text x="48" y="63" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="20" font-weight="700">Inventory Bulk Upload Template</text>

  <g font-family="Arial, sans-serif" font-size="13" fill="#0F172A" font-weight="700">
